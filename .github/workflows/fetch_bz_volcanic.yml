name: Fetch Bz Solar Wind & Volcanic Data

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: 'Start year (2008 for full archive)'
        required: false
        default: '2008'
  schedule:
    - cron: '0 8 * * 0'  # Every Sunday at 8am UTC

permissions:
  contents: write

jobs:
  fetch-bz-volcanic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create fetcher script
        run: |
          cat > bz_volcanic_fetcher.js << 'JSEOF'
          const https = require('https');
          const fs = require('fs');
          const path = require('path');

          const START_YEAR = parseInt(process.env.START_YEAR || '2008');
          const END_YEAR   = new Date().getFullYear();
          const BZ_DIR     = './solar_seismic_data/bz';
          const VOL_DIR    = './solar_seismic_data/volcanic';

          function log(msg) { console.log(`[${new Date().toISOString().slice(11,19)}] ${msg}`); }
          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

          function fetchURL(url, retries = 3) {
            return new Promise((resolve, reject) => {
              const attempt = (n) => {
                const req = https.get(url, { headers: { 'User-Agent': 'HelioSeismic-Fetcher/1.0' } }, res => {
                  if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                    return fetchURL(res.headers.location, retries).then(resolve).catch(reject);
                  }
                  if (res.statusCode !== 200) {
                    return reject(new Error(`HTTP ${res.statusCode} for ${url}`));
                  }
                  let data = '';
                  res.on('data', c => data += c);
                  res.on('end', () => resolve(data));
                });
                req.on('error', err => {
                  if (n < retries) { setTimeout(() => attempt(n+1), 3000); }
                  else reject(err);
                });
                req.setTimeout(60000, () => { req.destroy(); reject(new Error('Timeout')); });
              };
              attempt(1);
            });
          }

          // ── BZ FROM NASA OMNI2 ────────────────────────────────────────────
          // OMNI2 hourly data: https://spdf.gsfc.nasa.gov/pub/data/omni/low_res_omni/omni2_YYYY.dat
          // Fixed-width ASCII format
          // Col 1: Year, Col 2: Day of year, Col 3: Hour
          // Col 9: Field magnitude (nT)
          // Col 17: Bz GSM (nT) — fill value 999.9
          // Col 25: Solar wind speed (km/s) — fill value 9999.

          async function fetchBzYear(year) {
            const url = `https://spdf.gsfc.nasa.gov/pub/data/omni/low_res_omni/omni2_${year}.dat`;
            log(`  Fetching OMNI2 Bz ${year}: ${url}`);

            try {
              const raw = await fetchURL(url);
              const lines = raw.split('\n').filter(l => l.trim());
              const records = [];
              const bzEvents = [];
              let inFlip = false, flipStart = null, minBz = 0;

              lines.forEach(line => {
                const cols = line.trim().split(/\s+/);
                if (cols.length < 25) return;

                const yr    = parseInt(cols[0]);
                const doy   = parseInt(cols[1]);
                const hr    = parseInt(cols[2]);
                const bz    = parseFloat(cols[16]); // Col 17 (0-indexed: 16)
                const speed = parseFloat(cols[24]); // Col 25 (0-indexed: 24)

                // Skip fill values
                if (bz === 999.9 || isNaN(bz)) return;

                // Convert year + day-of-year + hour to timestamp
                const d = new Date(Date.UTC(yr, 0, doy, hr, 0, 0));
                const ts = d.getTime();

                records.push({
                  time:  ts,
                  bz:    Math.round(bz * 10) / 10,
                  speed: speed === 9999 ? null : Math.round(speed)
                });

                // Detect significant southward Bz events (< -10 nT)
                if (bz < -10 && !inFlip) {
                  inFlip = true; flipStart = ts; minBz = bz;
                } else if (bz < -10 && inFlip) {
                  if (bz < minBz) minBz = bz;
                } else if (bz >= -10 && inFlip) {
                  bzEvents.push({
                    flipStart,
                    flipEnd: ts,
                    minBz: Math.round(minBz * 10) / 10,
                    durationHrs: Math.round((ts - flipStart) / 36e5 * 10) / 10
                  });
                  inFlip = false; minBz = 0;
                }
              });

              log(`  OMNI2 ${year}: ${records.length} hourly records, ${bzEvents.length} southward events (<-10nT)`);
              return { records, events: bzEvents };

            } catch(e) {
              log(`  OMNI2 ${year} failed: ${e.message}`);
              return { records: [], events: [] };
            }
          }

          // ── VOLCANIC FROM GVP ─────────────────────────────────────────────
          async function fetchVolcanic() {
            log('\n── Fetching Volcanic Data (Smithsonian GVP) ──');
            const wfsUrl = 'https://webservices.volcano.si.edu/geoserver/GVP-VOTW/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=GVP-VOTW:E3WebApp_Eruptions1960&outputFormat=application%2Fjson&maxFeatures=10000';

            try {
              const raw = await fetchURL(wfsUrl);
              const data = JSON.parse(raw);
              if (!data.features) { log('  No features in GVP response'); return []; }

              const eruptions = data.features
                .filter(f => f.properties)
                .map(f => {
                  const p = f.properties;
                  const coords = f.geometry?.coordinates;
                  return {
                    volcano:   p.Volcano_Name || p.VolcanoName || p.volcano_name || '',
                    startYear: parseInt(p.StartYear || p.Start_Year || p.start_year || 0),
                    startDate: p.StartDate || p.Start_Date || null,
                    endDate:   p.EndDate   || p.End_Date   || null,
                    vei:       p.VEI !== undefined ? parseInt(p.VEI) : null,
                    lat:       coords ? Math.round(coords[1]*10000)/10000 : null,
                    lon:       coords ? Math.round(coords[0]*10000)/10000 : null,
                    country:   p.Country || '',
                    region:    p.Region || p.Volcanic_Region || p.volcanic_region || ''
                  };
                })
                .filter(e => e.startYear >= START_YEAR && e.startYear <= END_YEAR);

              log(`  GVP: ${eruptions.length} eruptions ${START_YEAR}-${END_YEAR}`);
              return eruptions;

            } catch(e) {
              log(`  GVP failed: ${e.message}`);
              return [];
            }
          }

          // ── MAIN ──────────────────────────────────────────────────────────
          async function main() {
            log('HelioSeismic Extended Fetcher — Bz (OMNI2) + Volcanic (GVP)');
            log(`Range: ${START_YEAR}-${END_YEAR}`);
            log('================================================');

            if (!fs.existsSync(BZ_DIR))  fs.mkdirSync(BZ_DIR,  { recursive: true });
            if (!fs.existsSync(VOL_DIR)) fs.mkdirSync(VOL_DIR, { recursive: true });

            // Bz year by year
            log('\n── Bz Solar Wind (NASA OMNI2) ──');
            for (let year = START_YEAR; year <= END_YEAR; year++) {
              const bzData = await fetchBzYear(year);
              const outPath = path.join(BZ_DIR, `${year}.json`);
              fs.writeFileSync(outPath, JSON.stringify({ year, ...bzData }));
              const kb = (fs.statSync(outPath).size / 1024).toFixed(1);
              log(`  ✓ ${year}.json (${kb} KB) — ${bzData.records.length} records, ${bzData.events.length} events`);
              await sleep(300);
            }

            // Volcanic
            const eruptions = await fetchVolcanic();
            log('\n── Sharding Volcanic by Year ──');
            const byYear = {};
            eruptions.forEach(e => {
              const y = e.startYear;
              if (!byYear[y]) byYear[y] = [];
              byYear[y].push(e);
            });
            for (let year = START_YEAR; year <= END_YEAR; year++) {
              const events = byYear[year] || [];
              const outPath = path.join(VOL_DIR, `${year}.json`);
              fs.writeFileSync(outPath, JSON.stringify({ year, eruptions: events }));
              log(`  ✓ ${year}.json — ${events.length} eruptions`);
            }

            log('\n================================================');
            log('Done.');
          }

          main().catch(e => { console.error('Fatal:', e); process.exit(1); });
          JSEOF

      - name: Run fetcher
        env:
          START_YEAR: ${{ github.event.inputs.start_year || '2008' }}
        run: node bz_volcanic_fetcher.js

      - name: Commit data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add solar_seismic_data/bz/ solar_seismic_data/volcanic/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Bz + volcanic data $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
